services:
  bw:
    image: bunkerity/bunkerweb:1.5.12
    container_name: df-bunkerweb
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      API_WHITELIST_IP: 127.0.0.1/32
      AUTO_LETS_ENCRYPT: "yes"
      USE_ANTIBOT: "yes"
    networks:
      - fortress-net

  scanner:
    image: projectdiscovery/nuclei:latest
    container_name: df-nuclei
    entrypoint: ["/bin/sh", "-c", "sleep infinity"]
    volumes:
      - ./scans:/app/results
    networks:
      - fortress-net

  db:
    image: postgres:15-alpine
    container_name: df-postgres
    environment:
      POSTGRES_DB: digital_fortress
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - df-postgres-data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d
    networks:
      - fortress-net

  redis:
    image: redis:7-alpine
    container_name: df-redis
    networks:
      - fortress-net

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: df-opensearch
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - df-opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - fortress-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: df-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/digital_fortress
      REDIS_URL: redis://redis:6379/0
      EVENT_CHANNEL: digital-fortress.events
      NUCLEI_USE_DOCKER: "true"
      NUCLEI_DOCKER_CONTAINER: df-nuclei
      JWT_SECRET: change-me
      COMPLIANCE_MODE_DEFAULT: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - scanner
      - bw
    networks:
      - fortress-net

  dashboard:
    build:
      context: ./dashboard/wazuh-dashboard-main
      dockerfile: Dockerfile
    container_name: df-dashboard
    command: >
      sh -c "yarn start --host 0.0.0.0 --port 8080 --no-base-path --opensearch.hosts=http://opensearch:9200 --opensearch.ignoreVersionMismatch=true"
    environment:
      OPENSEARCH_DASHBOARDS_PORT: "8080"
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      SERVER_HOST: "0.0.0.0"
    ports:
      - "5601:8080"
    depends_on:
      opensearch:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - fortress-net

networks:
  fortress-net:
    driver: bridge

volumes:
  df-postgres-data:
  df-opensearch-data:
